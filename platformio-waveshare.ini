; PlatformIO — Waveshare ESP32-Touch-LCD-3.5
; Usage: pio run -c platformio-waveshare.ini -e waveshare-35 -t upload

[platformio]
default_envs = waveshare-35
src_dir = WeatherWaveshare35

[env]
platform = espressif32 @ 6.4.0
framework = arduino
monitor_speed = 115200
lib_deps =
  tzapu/WiFiManager@2.0.17
  bodmer/TFT_eSPI@2.5.43
  bblanchon/ArduinoJson@7.1.0
  fbiego/ESP32Time@2.0.6

[env:waveshare-35]
board = esp32dev
board_build.partitions = min_spiffs.csv
board_upload.flash_size = 16MB
build_flags =
  -D CORE_DEBUG_LEVEL=0
  -D BOARD_HAS_PSRAM
  -D USER_SETUP_LOADED=1
  -I WeatherWaveshare35
  -include User_Setup_Waveshare_ESP32_Touch_LCD_35.h
