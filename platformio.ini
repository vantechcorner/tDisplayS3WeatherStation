; PlatformIO profiles for supported LilyGO / Waveshare boards

[platformio]
default_envs = ttgo-t-display
src_dir = WeatherTDisplay

[env]
platform = espressif32 @ 6.4.0
framework = arduino
monitor_speed = 115200
lib_deps =
  tzapu/WiFiManager@2.0.17
  bodmer/TFT_eSPI@2.5.43
  bblanchon/ArduinoJson@7.1.0
  fbiego/ESP32Time@2.0.6

; LilyGO TTGO T-Display — ESP32 Classic, 1.14" (240x135 landscape)
[env:ttgo-t-display]
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
  -D CORE_DEBUG_LEVEL=0
  -D USER_SETUP_LOADED=1
  -I WeatherTDisplay
  -include User_Setup_TTGO_T_Display.h

; LilyGO T-Display S3 — ESP32-S3, 1.9" (320x170 landscape)
[env:t-display-s3]
src_dir = WeatherTDisplayS3
board = lilygo-t-display-s3
board_build.partitions = default_8MB.csv
build_flags =
  -D CORE_DEBUG_LEVEL=0

; Waveshare ESP32-Touch-LCD-3.5 — use platformio-waveshare.ini instead:
;   pio run -c platformio-waveshare.ini -e waveshare-35 -t upload
